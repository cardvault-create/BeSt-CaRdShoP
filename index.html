<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>CARDVAULT • LUXE EDITION</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #03050a;
      --surface-glass: rgba(10, 15, 25, 0.75);
      --gold-primary: #e5b663;
      --gold-secondary: #c99a3c;
      --platinum: #e0e7ff;
      --accent-red: #c23a2e;
      --text-primary: #f3f3f7;
      --text-muted: #8e8ea0;
      --border-glow: rgba(229, 182, 99, 0.4);
      --card-shadow: 0 25px 40px -20px rgba(0,0,0,0.8);
    }

    body {
      background: var(--bg-deep);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Dynamic animated background */
    .bg-animated {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(229, 182, 99, 0.08) 0%, transparent 55%),
                  radial-gradient(ellipse at 80% 70%, rgba(200, 120, 60, 0.1) 0%, transparent 60%),
                  radial-gradient(ellipse at 10% 80%, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
      pointer-events: none;
    }

    .particles-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: var(--gold-primary);
      border-radius: 50%;
      filter: blur(1px);
      opacity: 0;
      animation: floatParticle 8s infinite ease-in;
    }

    @keyframes floatParticle {
      0% { transform: translateY(105vh) scale(0); opacity: 0; }
      10% { opacity: 0.7; }
      90% { opacity: 0.1; }
      100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 1450px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    /* Typography & Header */
    .header {
      text-align: center;
      margin-bottom: 1rem;
    }

    .luxe-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      background: rgba(229, 182, 99, 0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(229, 182, 99, 0.4);
      padding: 0.5rem 2rem;
      border-radius: 60px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-primary);
      margin-bottom: 1.8rem;
      box-shadow: 0 0 30px rgba(229, 182, 99, 0.2);
    }

    .animated-text {
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
      background: linear-gradient(180deg, #ffffff 20%, #c2a36b 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 25px rgba(229, 182, 99, 0.5));
      animation: titleGlow 3s infinite alternate;
    }

    @keyframes titleGlow {
      0% { filter: drop-shadow(0 0 15px rgba(229, 182, 99, 0.4)); }
      100% { filter: drop-shadow(0 0 35px rgba(229, 182, 99, 0.8)); }
    }

    .subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 400;
    }

    .counter-live {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 40px;
      padding: 0.4rem 1.8rem;
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      font-weight: 600;
      color: #e5b663;
      margin-top: 1.2rem;
    }

    .dot-live {
      width: 10px;
      height: 10px;
      background: #2ecc71;
      border-radius: 50%;
      box-shadow: 0 0 15px #2ecc71;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } }

    .sort-section, .filter-section {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .btn-sort, .btn-filter {
      background: rgba(20, 20, 30, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #c0c0d0;
      padding: 0.65rem 1.6rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }

    .btn-sort:hover, .btn-filter:hover {
      border-color: var(--gold-primary);
      color: var(--gold-primary);
      background: rgba(229, 182, 99, 0.1);
    }

    .btn-sort.active, .btn-filter.active {
      background: var(--gold-primary);
      border-color: var(--gold-primary);
      color: #0a0a0f;
      font-weight: 700;
      box-shadow: 0 0 25px rgba(229, 182, 99, 0.5);
    }

    /* Premium Card Grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }

    .card-premium {
      background: linear-gradient(145deg, rgba(20, 20, 30, 0.8) 0%, rgba(10, 10, 18, 0.9) 100%);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(229, 182, 99, 0.2);
      border-radius: 36px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1);
      box-shadow: 0 20px 35px -15px rgba(0,0,0,0.7);
      cursor: pointer;
    }

    .card-premium:hover {
      transform: translateY(-12px) scale(1.02);
      border-color: var(--gold-primary);
      box-shadow: 0 35px 55px -10px rgba(229, 182, 99, 0.4);
    }

    .card-top-glow {
      height: 4px;
      background: linear-gradient(90deg, #c99a3c, #f5e3b3, #c99a3c);
    }

    .card-content {
      padding: 1.5rem;
    }

    .card-type-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .network-badge {
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: #e5b663;
      background: rgba(229, 182, 99, 0.15);
      padding: 0.3rem 1rem;
      border-radius: 30px;
    }

    .price-tag {
      font-family: 'Inter', monospace;
      font-weight: 700;
      background: #1f1f2e;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      color: #f0c27b;
      border: 1px solid #c99a3c;
    }

    .card-visual {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 1rem 0;
    }

    .chip-gold {
      width: 42px;
      height: 32px;
      background: linear-gradient(135deg, #e5b663, #a67c2e);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 3px;
      box-shadow: 0 5px 15px rgba(229, 182, 99, 0.6);
    }

    .chip-line {
      width: 65%;
      height: 2px;
      background: #5e3e1a;
    }

    .card-number-display {
      font-family: 'Fira Code', monospace;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      background: rgba(0,0,0,0.5);
      padding: 0.6rem;
      border-radius: 14px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(5px);
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.7rem;
      margin: 1rem 0;
    }

    .detail-box {
      background: rgba(0,0,0,0.35);
      border-radius: 14px;
      padding: 0.5rem;
      text-align: center;
    }

    .detail-label {
      font-size: 0.55rem;
      color: #a0a0b0;
      text-transform: uppercase;
    }

    .detail-value {
      font-weight: 700;
      font-size: 0.8rem;
      color: #f0e6d2;
    }

    .balance-gold {
      color: #e5b663;
      font-weight: 800;
    }

    .holder-name {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #b0a08a;
    }

    .buy-section {
      background: rgba(229, 182, 99, 0.08);
      border-top: 1px solid rgba(229, 182, 99, 0.4);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: 0.3s;
    }

    .card-premium:hover .buy-section {
      background: rgba(229, 182, 99, 0.18);
    }

    .buy-text {
      font-weight: 700;
      color: #e5b663;
    }

    .arrow-icon {
      font-size: 1.5rem;
      color: #c99a3c;
      transition: 0.3s;
    }

    .card-premium:hover .arrow-icon {
      transform: translateX(6px);
      color: #f5e3b3;
    }

    /* Modal premium */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(25px);
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal.open {
      display: flex;
    }

    .modal-dialog {
      background: #0e0e1a;
      border: 2px solid #c99a3c;
      border-radius: 48px;
      width: 100%;
      max-width: 520px;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 0 80px rgba(229, 182, 99, 0.5);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      padding: 1.5rem;
      border-bottom: 1px solid #c99a3c;
    }

    .close-btn {
      background: none;
      border: 1px solid #c99a3c;
      color: #c99a3c;
      width: 36px;
      height: 36px;
      border-radius: 14px;
      font-size: 1.3rem;
      cursor: pointer;
    }

    .app-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 1.5rem 0;
    }

    .app-btn {
      background: #151525;
      border: 1px solid rgba(229, 182, 99, 0.3);
      border-radius: 24px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .btn-gold {
      background: linear-gradient(135deg, #c99a3c, #e5b663);
      color: black;
      font-weight: 800;
      border: none;
      padding: 1rem;
      border-radius: 40px;
      width: 100%;
    }

    .footer-note {
      text-align: center;
      color: #8e8ea0;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
<div class="bg-animated"></div>
<div class="particles-layer" id="particlesContainer"></div>

<div class="container">
  <div class="header">
    <div class="luxe-badge"><span>◆</span> ELITE VAULT <span>◆</span></div>
    <div class="animated-text">CARD<span style="color:#e5b663;">VAULT</span></div>
    <div class="subtitle">Premium Digital Assets</div>
    <div class="counter-live"><span class="dot-live"></span> <span id="liveUsersCount">124</span> COLLECTORS ONLINE</div>
  </div>

  <div class="sort-section">
    <button class="btn-sort active" id="sortPriceLow">Price ↑</button>
    <button class="btn-sort" id="sortPriceHigh">Price ↓</button>
    <button class="btn-sort" id="sortBalanceHigh">Balance</button>
  </div>

  <div class="filter-section" id="filterWrap">
    <button class="btn-filter active" data-type="all">All</button>
    <button class="btn-filter" data-type="visa">Visa</button>
    <button class="btn-filter" data-type="mastercard">Mastercard</button>
    <button class="btn-filter" data-type="amex">Amex</button>
    <button class="btn-filter" data-type="rupay">RuPay</button>
  </div>

  <div class="cards-grid" id="cardsGrid"></div>
  <div class="footer-note">◆ SECURE TRANSACTIONS ◆</div>
</div>

<div class="modal" id="paymentModal">
  <div class="modal-dialog">
    <div class="modal-header">
      <span style="color:#e5b663; font-weight: bold;">CARD DETAILS</span>
      <button class="close-btn" id="closeModalBtn">✕</button>
    </div>
    <div style="padding:1.5rem;">
      <div id="modalCardInfo"></div>
      <div class="app-grid">
        <div class="app-btn" id="btnPhonePe"><span>📱</span> PhonePe</div>
        <div class="app-btn" id="btnGPay"><span>G</span> Google Pay</div>
        <div class="app-btn" id="btnPaytm"><span>P</span> Paytm</div>
        <div class="app-btn" id="btnFamPay"><span>F</span> FamPay</div>
      </div>
      <input class="input-custom" id="utrInput" placeholder="UTR / Transaction ID" style="width:100%; padding:14px; border-radius:30px; background:#1a1a2e; border:1px solid #c99a3c; color:white; margin:12px 0;">
      <button class="btn-gold" id="confirmPaymentBtn">CONFIRM PAYMENT</button>
    </div>
  </div>
</div>

<script>
  (function() {
    const UPI_ID = "kartikrawat6266@okhdfcbank";
    const MERCHANT = "CARDVAULT";

    // Premium cards data
    const cardBrands = {
      visa: { prefix: ['4'], lengths: [16], display: 'VISA' },
      mastercard: { prefix: ['51','52','53','54','55'], lengths: [16], display: 'MASTERCARD' },
      amex: { prefix: ['34','37'], lengths: [15], display: 'AMEX' },
      rupay: { prefix: ['60','65','81','82'], lengths: [16], display: 'RUPAY' },
      discover: { prefix: ['6011','65'], lengths: [16], display: 'DISCOVER' }
    };
    const brands = Object.keys(cardBrands);
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    
    const cards = [];
    for (let i = 1; i <= 110; i++) {
      const type = brands[Math.floor(Math.random() * brands.length)];
      const fullNum = (cardBrands[type].prefix[0] + Array(cardBrands[type].lengths[0] - cardBrands[type].prefix[0].length).fill(0).map(()=>Math.floor(Math.random()*10)).join('')).slice(0, cardBrands[type].lengths[0]);
      const price = rand(150, 950);
      cards.push({
        id: i, type, fullNumber: fullNum,
        displayNumber: fullNum.slice(0,12).replace(/(.{4})/g,'$1 ') + ' XXXX',
        expiry: `${String(rand(1,12)).padStart(2,'0')}/${rand(26,30)}`,
        cvv: type==='amex' ? String(rand(1000,9999)) : String(rand(100,999)),
        holder: ['A. SHARMA','PRIYA K.','ROHAN D.','VIKRAM S.'][rand(0,3)],
        price: price, balance: price * 10
      });
    }
    cards.sort((a,b) => a.price - b.price);

    // Background particles
    const pContainer = document.getElementById('particlesContainer');
    for (let i=0; i<50; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random()*100+'%';
      p.style.width = p.style.height = (Math.random()*5+2)+'px';
      p.style.animationDelay = Math.random()*8+'s';
      p.style.animationDuration = (Math.random()*7+5)+'s';
      pContainer.appendChild(p);
    }

    // Live counter
    const liveEl = document.getElementById('liveUsersCount');
    setInterval(() => { liveEl.textContent = Math.floor(Math.random()*50)+90; }, 4000);

    let currentCard = null;
    let currentFilter = 'all';
    let currentSort = 'price-low';

    function renderCards() {
      let filtered = currentFilter === 'all' ? [...cards] : cards.filter(c => c.type === currentFilter);
      if (currentSort === 'price-low') filtered.sort((a,b) => a.price - b.price);
      else if (currentSort === 'price-high') filtered.sort((a,b) => b.price - a.price);
      else if (currentSort === 'balance-high') filtered.sort((a,b) => b.balance - a.balance);
      
      const grid = document.getElementById('cardsGrid');
      grid.innerHTML = filtered.map(c => `
        <div class="card-premium">
          <div class="card-top-glow"></div>
          <div class="card-content">
            <div class="card-type-row">
              <span class="network-badge">${cardBrands[c.type].display}</span>
              <span class="price-tag">₹${c.price}</span>
            </div>
            <div class="card-visual">
              <div class="chip-gold"><div class="chip-line"></div><div class="chip-line"></div></div>
            </div>
            <div class="card-number-display">${c.displayNumber}</div>
            <div class="details-grid">
              <div class="detail-box"><div class="detail-label">EXP</div><div class="detail-value">${c.expiry}</div></div>
              <div class="detail-box"><div class="detail-label">CVV</div><div class="detail-value">${c.cvv}</div></div>
              <div class="detail-box"><div class="detail-label">BAL</div><div class="detail-value balance-gold">₹${c.balance}</div></div>
            </div>
            <div class="holder-name">${c.holder}</div>
          </div>
          <div class="buy-section" data-id="${c.id}">
            <span class="buy-text">UNLOCK CARD</span>
            <span class="arrow-icon">→</span>
          </div>
        </div>
      `).join('');
      
      document.querySelectorAll('.buy-section').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(btn.dataset.id);
          currentCard = cards.find(c => c.id === id);
          openModal(currentCard);
        });
      });
    }

    function openModal(card) {
      document.getElementById('modalCardInfo').innerHTML = `
        <div style="background:#1a1a2e; border-radius:24px; padding:1rem; margin-bottom:1rem;">
          <p><strong>${cardBrands[card.type].display}</strong> • ${card.displayNumber}</p>
          <p>CVV: ${card.cvv} | EXP: ${card.expiry}</p>
          <p style="color:#e5b663; font-size:1.5rem; font-weight:bold;">₹${card.price}</p>
        </div>
      `;
      document.getElementById('paymentModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('paymentModal').classList.remove('open');
    }

    function openUPIApp(app) {
      if (!currentCard) return;
      const amt = currentCard.price.toFixed(2);
      const note = `CARD_${currentCard.id}`;
      const upiStr = `upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(MERCHANT)}&am=${amt}&cu=INR&tn=${note}`;
      if (app === 'fampay') window.location.href = `intent://pay?pa=${UPI_ID}&pn=${encodeURIComponent(MERCHANT)}&am=${amt}&cu=INR&tn=${note}#Intent;scheme=upi;package=com.fampay.in;end`;
      else if (app === 'phonepe') window.location.href = `phonepe://pay?pa=${UPI_ID}&pn=${encodeURIComponent(MERCHANT)}&am=${amt}&cu=INR&tn=${note}`;
      else if (app === 'gpay') window.location.href = `tez://upi/pay?pa=${UPI_ID}&pn=${encodeURIComponent(MERCHANT)}&am=${amt}&cu=INR&tn=${note}`;
      else if (app === 'paytm') window.location.href = `paytmmp://pay?pa=${UPI_ID}&pn=${encodeURIComponent(MERCHANT)}&am=${amt}&cu=INR&tn=${note}`;
      setTimeout(() => { if (!document.hidden) window.location.href = upiStr; }, 1800);
    }

    document.getElementById('btnPhonePe').onclick = ()=> openUPIApp('phonepe');
    document.getElementById('btnGPay').onclick = ()=> openUPIApp('gpay');
    document.getElementById('btnPaytm').onclick = ()=> openUPIApp('paytm');
    document.getElementById('btnFamPay').onclick = ()=> openUPIApp('fampay');
    document.getElementById('confirmPaymentBtn').onclick = ()=>{
      const utr = document.getElementById('utrInput').value.trim();
      if(!utr) alert('Enter UTR');
      else { alert('Payment confirmed'); closeModal(); }
    };
    document.getElementById('closeModalBtn').onclick = closeModal;

    document.querySelectorAll('.btn-sort').forEach(b => {
      b.addEventListener('click', function() {
        document.querySelectorAll('.btn-sort').forEach(x => x.classList.remove('active'));
        this.classList.add('active');
        if(this.id === 'sortPriceLow') currentSort = 'price-low';
        else if(this.id === 'sortPriceHigh') currentSort = 'price-high';
        else currentSort = 'balance-high';
        renderCards();
      });
    });

    document.querySelectorAll('.btn-filter').forEach(b => {
      b.addEventListener('click', function() {
        document.querySelectorAll('.btn-filter').forEach(x => x.classList.remove('active'));
        this.classList.add('active');
        currentFilter = this.dataset.type;
        renderCards();
      });
    });

    renderCards();
  })();
</script>
</body>
</html>
