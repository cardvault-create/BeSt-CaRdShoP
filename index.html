<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>☠️ CardVault • Premium UPI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Creepster&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --s1: #0a0a0a;
      --s2: #0f0f0f;
      --border: rgba(255, 0, 0, 0.2);
      --border-glow: rgba(0, 255, 0, 0.3);
      --text: #e0e0e0;
      --muted: #888;
      --dim: #555;
      --blood: #ff0033;
      --toxic: #0eff00;
      --dark-red: #8b0000;
      --gold: #ffd700;
      --r: 14px;
    }

    body {
      background: #000;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    #matrixCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.12;
      pointer-events: none;
    }

    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: var(--toxic);
      border-radius: 50%;
      animation: floatUp 4s infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      20% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(-100px) scale(1);
        opacity: 0;
      }
    }

    .wrap {
      position: relative;
      z-index: 2;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--toxic);
      border: 2px solid var(--blood);
      padding: 0.4rem 1.2rem;
      border-radius: 99px;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 20px var(--toxic);
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.3), inset 0 0 15px rgba(255, 0, 0, 0.1);
      animation: glitchText 3s infinite;
    }

    @keyframes glitchText {

      0%,
      100% {
        transform: translate(0);
      }

      20% {
        transform: translate(-2px, 2px);
      }

      40% {
        transform: translate(2px, -1px);
      }

      60% {
        transform: translate(-1px, 1px);
      }

      80% {
        transform: translate(1px, -2px);
      }
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--toxic);
      box-shadow: 0 0 15px var(--toxic);
      animation: blink 1s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.2
      }
    }

    .header h1 {
      font-family: 'Creepster', cursive;
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1;
      margin-bottom: 0.5rem;
      color: var(--blood);
      text-shadow: 0 0 40px var(--blood), 0 0 80px var(--dark-red);
      animation: glitchText 2s infinite;
    }

    .header h1 em {
      font-style: normal;
      color: var(--toxic);
      text-shadow: 0 0 40px var(--toxic);
    }

    .header p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .live-users-counter {
      background: rgba(255, 0, 0, 0.1);
      border: 2px solid var(--blood);
      border-radius: 99px;
      padding: 0.5rem 1.3rem;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--toxic);
      margin-bottom: 1.5rem;
      box-shadow: 0 0 25px rgba(255, 0, 0, 0.2);
    }

    .sort-wrap,
    .filter-wrap {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .sort-btn,
    .filter-btn {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.4rem 1rem;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid var(--border);
      color: var(--muted);
      border-radius: 99px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
    }

    .sort-btn:hover,
    .filter-btn:hover {
      border-color: var(--toxic);
      color: var(--toxic);
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
    }

    .sort-btn.active,
    .filter-btn.active {
      background: rgba(0, 255, 0, 0.15);
      border-color: var(--toxic);
      color: var(--toxic);
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
    }

    /* CARDS GRID */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: linear-gradient(135deg, rgba(15, 0, 0, 0.9), rgba(0, 0, 0, 0.95));
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      position: relative;
      backdrop-filter: blur(2px);
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(255, 0, 0, 0.1), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: var(--toxic);
      box-shadow: 0 20px 40px rgba(255, 0, 0, 0.4);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-bar {
      height: 3px;
      background: linear-gradient(90deg, var(--blood), var(--toxic), var(--blood));
    }

    .card-body {
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .net-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: var(--toxic);
      text-shadow: 0 0 8px var(--toxic);
    }

    .price-badge {
      font-family: monospace;
      font-weight: 800;
      background: rgba(255, 0, 0, 0.2);
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      color: #ff8888;
      border: 1px solid var(--blood);
    }

    .chip-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .chip {
      width: 35px;
      height: 24px;
      background: linear-gradient(135deg, #ffd700, #b8860b);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 2px;
    }

    .chip-line {
      width: 70%;
      height: 1.5px;
      background: rgba(0, 0, 0, 0.5);
    }

    .card-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      letter-spacing: 0.1em;
      background: rgba(0, 0, 0, 0.6);
      padding: 0.5rem;
      border-radius: 8px;
      text-align: center;
      border: 1px solid var(--border);
    }

    .card-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .meta-box {
      background: rgba(0, 0, 0, 0.5);
      padding: 0.3rem;
      border-radius: 6px;
      text-align: center;
    }

    .meta-lbl {
      font-size: 0.5rem;
      color: var(--dim);
      text-transform: uppercase;
    }

    .meta-val {
      font-family: monospace;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .balance-text {
      color: var(--toxic);
    }

    .holder {
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* PREMIUM BUY BUTTON */
    .buy-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(135deg, #1f0000, #0a0000);
      border-top: 2px solid var(--blood);
      padding: 0.9rem 1.2rem;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .buy-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 0, 0, 0.3), transparent);
      transition: left 0.5s;
    }

    .buy-btn:hover::after {
      left: 100%;
    }

    .buy-btn:hover {
      background: #2a0000;
      border-top-color: var(--toxic);
    }

    .buy-left {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .qr-icon-wrap {
      width: 38px;
      height: 38px;
      background: rgba(255, 0, 0, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      border: 1px solid var(--blood);
    }

    .buy-label {
      font-weight: 800;
      font-size: 0.8rem;
      color: #ff6666;
    }

    .buy-sub {
      font-size: 0.6rem;
      color: var(--muted);
    }

    .buy-arrow {
      font-size: 1.5rem;
      color: var(--blood);
      transition: transform 0.2s;
    }

    .buy-btn:hover .buy-arrow {
      transform: translateX(6px);
      color: var(--toxic);
    }

    /* MODAL PREMIUM */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal.open {
      display: flex;
    }

    .mbox {
      background: #0c0c0c;
      border: 2px solid var(--blood);
      border-radius: 28px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 0 80px rgba(255, 0, 0, 0.5);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .mbox-topbar {
      height: 4px;
      background: linear-gradient(90deg, var(--blood), var(--toxic), var(--blood));
    }

    .mbox-head {
      display: flex;
      justify-content: space-between;
      padding: 1.2rem;
      border-bottom: 1px solid var(--border);
    }

    .mbox-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      color: var(--toxic);
    }

    .mclose-btn {
      width: 32px;
      height: 32px;
      background: rgba(255, 0, 0, 0.1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid var(--blood);
    }

    .mbox-body {
      padding: 1.5rem;
    }

    .m-info {
      background: #000;
      padding: 0.8rem;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      border: 1px solid var(--border);
      margin-bottom: 1rem;
    }

    .m-price-box {
      background: linear-gradient(135deg, #1a0000, #000);
      border-radius: 20px;
      padding: 1rem;
      text-align: center;
      border: 1px solid var(--blood);
      margin-bottom: 1.2rem;
    }

    .m-price-amount {
      font-size: 2.2rem;
      font-weight: 800;
      font-family: monospace;
      color: var(--blood);
    }

    .qr-section {
      background: #050505;
      border-radius: 24px;
      padding: 1rem;
      text-align: center;
      border: 1px solid var(--border);
      margin-bottom: 1rem;
    }

    .qr-label {
      font-size: 0.7rem;
      color: var(--toxic);
      margin-bottom: 0.5rem;
    }

    #dynamicQR {
      display: flex;
      justify-content: center;
      margin: 0.5rem 0;
      background: white;
      padding: 12px;
      border-radius: 20px;
      display: inline-block;
      width: auto;
    }

    .qr-amount-tag {
      font-size: 0.9rem;
      font-weight: bold;
      color: var(--gold);
      margin-top: 8px;
    }

    .payment-apps {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 1rem 0;
    }

    .payment-app-btn {
      flex: 1;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 60px;
      padding: 10px 8px;
      font-weight: bold;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.2s;
      color: #ddd;
    }

    .payment-app-btn:hover {
      background: var(--blood);
      color: white;
      border-color: var(--toxic);
      transform: scale(0.97);
    }

    .input-group {
      margin-bottom: 12px;
    }

    .input-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 4px;
    }

    .cust-input {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      color: white;
      font-family: monospace;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 60px;
      font-weight: 800;
      border: none;
      cursor: pointer;
      margin-top: 12px;
      transition: 0.2s;
    }

    .btn-success {
      background: linear-gradient(135deg, #00aa00, #006600);
      color: white;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .flex-row {
      display: flex;
      gap: 12px;
    }

    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }
  </style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>
<div class="particles" id="particlesContainer"></div>

<div class="wrap">
  <div class="header">
    <div class="eyebrow"><div class="live-dot"></div> ☠️ VAULT v3.0</div>
    <h1>💀 Card <em>Vault</em></h1>
    <p>Premium Cards • Dynamic UPI • Auto Amount</p>
    <div class="live-users-counter"><span>👁️</span> <span id="liveUsersCount">69</span> <span>WATCHING</span></div>
  </div>

  <div class="sort-wrap">
    <button class="sort-btn active" id="sortPriceLow">💰 Low → High</button>
    <button class="sort-btn" id="sortPriceHigh">💎 High → Low</button>
    <button class="sort-btn" id="sortBalanceHigh">🏦 Max Balance</button>
  </div>

  <div class="filter-wrap" id="filterWrap">
    <button class="filter-btn active" data-type="all">All</button>
    <button class="filter-btn" data-type="visa">Visa</button>
    <button class="filter-btn" data-type="mastercard">MC</button>
    <button class="filter-btn" data-type="amex">Amex</button>
    <button class="filter-btn" data-type="rupay">RuPay</button>
    <button class="filter-btn" data-type="discover">Discover</button>
  </div>

  <div class="cards-grid" id="cardsGrid"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="mbox">
    <div class="mbox-topbar"></div>
    <div class="mbox-head">
      <div class="mbox-title">💀 UPI SECURE PAYMENT</div>
      <div class="mclose-btn" id="mcloseBtn">✕</div>
    </div>
    <div class="mbox-body">
      <div class="m-info">
        <span id="mNum">XXXX XXXX XXXX XXXX</span>
        <span id="mNet" style="color:var(--toxic);">VISA</span>
      </div>
      <div class="m-price-box">
        <div class="m-price-amount" id="mPrice">₹0</div>
      </div>

      <!-- DYNAMIC QR (always visible) -->
      <div class="qr-section">
        <div class="qr-label">📲 SCAN & PAY - AMOUNT AUTO SET</div>
        <div id="dynamicQR" style="display: flex; justify-content: center;"></div>
        <div class="qr-amount-tag" id="qrAmountTag">₹0</div>
        <div style="font-size: 0.6rem; margin-top: 8px;">UPI: kartikrawat6266@okhdfcbank</div>
      </div>

      <!-- Payment Apps -->
      <div class="payment-apps">
        <button class="payment-app-btn" id="btnPhonePe">📱 PhonePe</button>
        <button class="payment-app-btn" id="btnGPay">💳 Google Pay</button>
        <button class="payment-app-btn" id="btnPaytm">💰 Paytm</button>
        <button class="payment-app-btn" id="btnFamPay">👨‍👩‍👧 FamPay</button>
      </div>

      <div class="input-group"><div class="input-label">📞 WhatsApp / Mobile</div><input class="cust-input" id="phoneInput" placeholder="+91 9876543210"></div>
      <div class="input-group"><div class="input-label">📧 Email</div><input class="cust-input" id="emailInput" placeholder="you@example.com"></div>
      <div class="input-group"><div class="input-label">🔗 UTR / Transaction ID</div><input class="cust-input" id="utrInput" placeholder="Enter UTR after payment"></div>
      <button class="btn btn-success" id="btnPaid">✅ I HAVE PAID - SUBMIT</button>
      <div class="flex-row"><button class="btn btn-ghost" id="btnCloseModal">Close</button></div>
    </div>
  </div>
</div>

<footer><p>☠️ <span style="color:var(--toxic);">CardVault</span> • Instant UPI • Auto QR Amount</p></footer>

<script>
  (function() {
    // ---------- CONFIG ----------
    const MY_UPI_ID = "kartikrawat6266@okhdfcbank";
    const MERCHANT_NAME = "CardVault";

    // ---------- CARD DATA (110 cards) ----------
    const cardTypes = {
      visa: { prefix: ['4'], lengths: [16], display: 'VISA', color: '#93c5fd' },
      mastercard: { prefix: ['51', '52', '53', '54', '55'], lengths: [16], display: 'MASTERCARD', color: '#fb923c' },
      amex: { prefix: ['34', '37'], lengths: [15], display: 'AMEX', color: '#6ee7b7' },
      discover: { prefix: ['6011', '65'], lengths: [16], display: 'DISCOVER', color: '#fde68a' },
      rupay: { prefix: ['60', '65', '81', '82'], lengths: [16], display: 'RUPAY', color: '#d8b4fe' }
    };
    const types = Object.keys(cardTypes);
    function rInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function genFullNum(type) {
      const ci = cardTypes[type];
      const p = ci.prefix[Math.floor(Math.random() * ci.prefix.length)];
      const l = ci.lengths[0];
      let n = p;
      while (n.length < l) n += Math.floor(Math.random() * 10);
      return n;
    }
    function maskNum(full) { const c = full.replace(/\s/g, ''); return c.substring(0, 12).replace(/(.{4})/g, '$1 ') + ' XXXX'; }
    function genExp() { return `${String(rInt(1, 12)).padStart(2, '0')}/${rInt(25, 30)}`; }
    function genCVV(t) { return t === 'amex' ? String(rInt(1000, 9999)) : String(rInt(100, 999)); }
    const holders = ['A. SHARMA', 'PRIYA K.', 'ROHAN D.', 'ANANYA V.', 'VIKRAM S.', 'NEHA G.', 'ARJUN M.', 'DIVYA R.', 'KABIR S.', 'RITIKA P.'];

    const cards = [];
    for (let i = 1; i <= 110; i++) {
      const type = types[Math.floor(Math.random() * types.length)];
      const price = rInt(100, 1000);
      cards.push({
        id: i, type, fullNumber: genFullNum(type), displayNumber: maskNum(genFullNum(type)),
        realExpiry: genExp(), realCVV: genCVV(type), holder: holders[Math.floor(Math.random() * holders.length)],
        price: price, balance: price * 10
      });
    }
    cards.sort((a, b) => a.price - b.price);

    // ---------- BACKGROUND EFFECTS ----------
    const canvas = document.getElementById('matrixCanvas'), ctx = canvas.getContext('2d');
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resizeCanvas();
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*☠️';
    const fontSize = 14, columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(0).map(() => Math.random() * canvas.height / fontSize);
    function drawMatrix() {
      ctx.fillStyle = 'rgba(0,0,0,0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0f0';
      ctx.font = `${fontSize}px monospace`;
      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(drawMatrix, 45);
    window.addEventListener('resize', () => { resizeCanvas(); });

    // particles
    const pContainer = document.getElementById('particlesContainer');
    for (let i = 0; i < 50; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.width = p.style.height = Math.random() * 5 + 2 + 'px';
      p.style.animationDuration = Math.random() * 4 + 2 + 's';
      p.style.animationDelay = Math.random() * 5 + 's';
      pContainer.appendChild(p);
    }

    // live counter
    const liveEl = document.getElementById('liveUsersCount');
    function updateLive() { liveEl.textContent = Math.floor(Math.random() * 70) + 40; setTimeout(updateLive, 4000); }
    updateLive();

    // ---------- APP STATE ----------
    let currentCard = null;
    let currentFilter = 'all';
    let currentSort = 'price-low';
    let qrInstance = null;
    const orders = JSON.parse(localStorage.getItem('cardvault_orders') || '[]');
    function saveOrders() { localStorage.setItem('cardvault_orders', JSON.stringify(orders)); }

    // UPI Link generator
    function generateUPILink(amount, note = '') {
      return `upi://pay?pa=${MY_UPI_ID}&pn=${MERCHANT_NAME}&am=${amount.toFixed(2)}&cu=INR&tn=${note || `Card_${Date.now()}`}`;
    }

    // Refresh QR with exact amount
    function refreshQRCode(amount) {
      const container = document.getElementById('dynamicQR');
      if (!container) return;
      container.innerHTML = '';
      const upiString = generateUPILink(amount, `Vault_${currentCard?.id || 0}`);
      try {
        qrInstance = new QRCode(container, {
          text: upiString,
          width: 170,
          height: 170,
          colorDark: "#000000",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.H
        });
      } catch (e) { container.innerHTML = '<div style="color:red;">⚠️ QR Error</div>'; }
      document.getElementById('qrAmountTag').innerText = `₹${amount}`;
    }

    // Open any UPI app with AUTO amount
    function openUpiApp(appName) {
      if (!currentCard) {
        alert('No card selected!');
        return;
      }
      const amount = currentCard.price;
      const upiLink = generateUPILink(amount, `Card_${currentCard.id}`);
      let intent = upiLink;
      if (appName === 'phonepe') intent = upiLink.replace('upi://', 'phonepe://');
      else if (appName === 'gpay') intent = upiLink.replace('upi://', 'tez://');
      else if (appName === 'paytm') intent = upiLink.replace('upi://', 'paytmmp://');
      else if (appName === 'fampay') intent = upiLink.replace('upi://', 'fampay://');
      
      // Fallback: try to open, if fails show toast
      window.location.href = intent;
      setTimeout(() => {
        alert(`💰 ${appName.toUpperCase()}\nAmount ₹${amount} auto-filled.\nComplete payment & submit UTR.`);
      }, 800);
    }

    // Modal & Render
    function openModal(card) {
      currentCard = card;
      document.getElementById('mNum').innerText = card.displayNumber;
      document.getElementById('mNet').innerHTML = cardTypes[card.type].display;
      document.getElementById('mPrice').innerHTML = `₹${card.price}`;
      refreshQRCode(card.price);
      document.getElementById('phoneInput').value = '';
      document.getElementById('emailInput').value = '';
      document.getElementById('utrInput').value = '';
      document.getElementById('modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.body.style.overflow = '';
      currentCard = null;
    }

    // Submit order
    document.getElementById('btnPaid').addEventListener('click', () => {
      if (!currentCard) return alert('Error: No card');
      const phone = document.getElementById('phoneInput').value.trim();
      const email = document.getElementById('emailInput').value.trim();
      const utr = document.getElementById('utrInput').value.trim();
      if (!phone || !email || !utr) return alert('☠️ Fill WhatsApp, Email & UTR');
      orders.unshift({
        phone, email, utr,
        cardNet: cardTypes[currentCard.type].display,
        cardNumber: currentCard.fullNumber,
        expiry: currentCard.realExpiry,
        cvv: currentCard.realCVV,
        price: currentCard.price,
        balance: currentCard.balance,
        time: Date.now()
      });
      saveOrders();
      alert(`✅ ORDER SUBMITTED!\n\nCard: ${currentCard.fullNumber}\nExpiry: ${currentCard.realExpiry}\nCVV: ${currentCard.realCVV}\nUTR: ${utr}\n\nWe'll verify & deliver within 5 mins.`);
      closeModal();
    });

    // RENDER GRID
    function getFilteredSorted() {
      let list = currentFilter === 'all' ? [...cards] : cards.filter(c => c.type === currentFilter);
      if (currentSort === 'price-low') list.sort((a, b) => a.price - b.price);
      else if (currentSort === 'price-high') list.sort((a, b) => b.price - a.price);
      else if (currentSort === 'balance-high') list.sort((a, b) => b.balance - a.balance);
      return list;
    }

    function renderCards() {
      const list = getFilteredSorted();
      const grid = document.getElementById('cardsGrid');
      grid.innerHTML = list.map(c => `
        <div class="card">
          <div class="card-bar"></div>
          <div class="card-body">
            <div class="card-head">
              <div class="net-label">${cardTypes[c.type].display}</div>
              <div class="price-badge">₹${c.price}</div>
            </div>
            <div class="chip-row"><div class="chip"><div class="chip-line"></div><div class="chip-line"></div><div class="chip-line"></div></div><div class="nfc">📳</div></div>
            <div class="card-number">${c.displayNumber}</div>
            <div class="card-meta">
              <div class="meta-box"><div class="meta-lbl">Expires</div><div class="meta-val">${c.realExpiry}</div></div>
              <div class="meta-box"><div class="meta-lbl">CVV / Bal</div><div class="meta-val">*** <span class="balance-text">₹${c.balance}</span></div></div>
            </div>
            <div class="holder">${c.holder}</div>
          </div>
          <div class="buy-btn" data-id="${c.id}">
            <div class="buy-left"><div class="qr-icon-wrap">💀</div><div class="buy-texts"><div class="buy-label">UNLOCK CARD</div><div class="buy-sub">Pay ₹${c.price}</div></div></div>
            <div class="buy-arrow">➡️</div>
          </div>
        </div>
      `).join('');
      document.querySelectorAll('.buy-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(btn.dataset.id);
          const card = cards.find(c => c.id === id);
          if (card) openModal(card);
        });
      });
    }

    // Sorting & Filtering event handlers
    document.getElementById('sortPriceLow').addEventListener('click', () => {
      currentSort = 'price-low';
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('sortPriceLow').classList.add('active');
      renderCards();
    });
    document.getElementById('sortPriceHigh').addEventListener('click', () => {
      currentSort = 'price-high';
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('sortPriceHigh').classList.add('active');
      renderCards();
    });
    document.getElementById('sortBalanceHigh').addEventListener('click', () => {
      currentSort = 'balance-high';
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('sortBalanceHigh').classList.add('active');
      renderCards();
    });
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderCards();
      });
    });

    // Modal controls
    document.getElementById('mcloseBtn').addEventListener('click', closeModal);
    document.getElementById('btnCloseModal').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', (e) => { if (e.target === document.getElementById('modal')) closeModal(); });

    // Attach payment app handlers (auto amount)
    document.getElementById('btnPhonePe').addEventListener('click', () => openUpiApp('phonepe'));
    document.getElementById('btnGPay').addEventListener('click', () => openUpiApp('gpay'));
    document.getElementById('btnPaytm').addEventListener('click', () => openUpiApp('paytm'));
    document.getElementById('btnFamPay').addEventListener('click', () => openUpiApp('fampay'));

    renderCards();
  })();
</script>
</body>
</html>
